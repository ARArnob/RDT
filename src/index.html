<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDT SSE Web Interface</title>
    <style>
        body { font-family: monospace; background: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 15px; background: #1e1e1e; display: flex; gap: 10px; border-bottom: 1px solid #333; align-items: center; }
        button, input { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; cursor: pointer; font-family: inherit; font-size: 14px; }
        button:hover { background: #444; }
        #log-container { flex: 1; overflow-y: auto; padding: 15px; }
        .log-entry { margin-bottom: 5px; line-height: 1.4; }
        .log-time { color: #888; margin-right: 10px; }
        .log-source { font-weight: bold; width: 45px; display: inline-block; }
        .source-SND { color: #4fc1ff; }
        .source-RCV { color: #4ec9b0; }
        .source-SIM { color: #c586c0; }
        .source-SYS { color: #dcdcaa; }
        .color-info { color: #d4d4d4; }
        .color-success { color: #6a9955; }
        .color-warning { color: #ce9178; }
        .color-error { color: #f44747; }
    </style>
</head>
<body>
    <div id="header">
        <button onclick="triggerDrop()" style="color: #c586c0; border-color: #c586c0;">⚡ Force Drop</button>
        <input type="text" id="msgInput" placeholder="Message..." style="flex:1" value="Native Java SSE test">
        <button onclick="triggerSend()" style="background: #007acc; border-color: #007acc;">🚀 Start Transfer</button>
        <button onclick="clearLogs()">🗑️ Clear</button>
    </div>
    <div id="log-container"></div>

    <script>
        const logContainer = document.getElementById('log-container');
        
        const evtSource = new EventSource('/events');
        evtSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const div = document.createElement('div');
            div.className = `log-entry color-${data.color}`;
            div.innerHTML = `<span class="log-time">[${data.timestamp}]</span><span class="log-source source-${data.source}">${data.source}</span> <span class="log-msg">${data.message}</span>`;
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
        };

        evtSource.onerror = function(err) {
            console.error("EventSource failed:", err);
        };

        function triggerDrop() { fetch('/api/drop', { method: 'POST' }); }
        function triggerSend() { 
            const msg = document.getElementById('msgInput').value;
            fetch('/api/send?message=' + encodeURIComponent(msg), { method: 'POST' }); 
        }
        function clearLogs() { logContainer.innerHTML = ''; }
    </script>
</body>
</html>
