<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDT Web Interface</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 10px; background: #252526; display: flex; gap: 10px; border-bottom: 1px solid #333; align-items: center; }
        button, input { background: #3c3c3c; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; font-family: inherit; }
        button:hover { background: #4a4a4a; }
        #log-container { flex: 1; overflow-y: auto; padding: 10px; }
        .log-entry { margin-bottom: 4px; }
        .log-time { color: #888; margin-right: 10px; }
        .log-source { font-weight: bold; width: 40px; display: inline-block; }
        .source-SND { color: #569cd6; }
        .source-RCV { color: #4ec9b0; }
        .source-SIM { color: #c586c0; }
        .source-SYS { color: #dcdcaa; }
        .type-info { color: #d4d4d4; }
        .type-success { color: #6a9955; }
        .type-warning { color: #ce9178; }
        .type-error { color: #f44747; }
    </style>
</head>
<body>
    <div id="header">
        <button onclick="triggerDrop()" style="color: #c586c0; border-color: #c586c0;">⚡ Force Manual Drop</button>
        <input type="text" id="msgInput" placeholder="Message..." style="flex:1" value="Test RDT transfer over web">
        <button onclick="triggerSend()" style="background: #007acc; border-color: #007acc;">🚀 Send</button>
        <button onclick="clearLogs()">🗑️ Clear</button>
    </div>
    <div id="log-container"></div>

    <script>
        const logContainer = document.getElementById('log-container');
        const ws = new WebSocket(`ws://${window.location.host}/api/ws`);
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const div = document.createElement('div');
            div.className = `log-entry type-${data.type}`;
            div.innerHTML = `<span class="log-time">[${data.timestamp}]</span><span class="log-source source-${data.source}">${data.source}</span> <span class="log-msg">${data.message.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</span>`;
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
        };

        function triggerDrop() { fetch('/api/simulator/drop', { method: 'POST' }); }
        function triggerSend() { 
            const msg = document.getElementById('msgInput').value;
            fetch('/api/simulator/send?message=' + encodeURIComponent(msg), { method: 'POST' })
                .then(res => { if (!res.ok) alert("Transfer already in progress!"); }); 
        }
        function clearLogs() { logContainer.innerHTML = ''; }
    </script>
</body>
</html>
